conky.config = {

	own_window = true,
	own_window_type = 'normal',
	own_window_hints = 'undecorated,below,skip_taskbar,skip_pager,sticky',
	own_window_argb_visual = true,
	own_window_argb_value = 0,
	gap_x = 60,
	gap_y = 20,
	alignment = 'top_right',
	use_xft = true,
	xftalpha = 1,
	override_utf8_locale = true,
	draw_borders = true,
	border_width = 1,
	no_buffers = true,
	short_units = true,
	double_buffer = true,
	update_interval = 1,
